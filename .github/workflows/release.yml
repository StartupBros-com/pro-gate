name: Release runtime

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
      - name: Require the tag to identify this full commit
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          test "$(git rev-list -n 1 "$RELEASE_TAG")" = "$RELEASE_SHA"
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
      - name: Validate shell syntax
        run: |
          while IFS= read -r file; do bash -n "$file"; done < <(find . -type f -name '*.sh' -print)
      - name: Run tests
        run: |
          bash tests/engine.test.sh
          bash tests/daemon-reload.test.sh
          node --test tests/cdp-salvage.test.mjs
          bash tests/distribution.test.sh
          bash tests/release-train.test.sh
      - name: Package exact runtime release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: scripts/package-runtime.sh
      - name: Verify published checksum
        run: sha256sum -c "dist/pro-gate-runtime-$(tr -d '[:space:]' < VERSION).tar.gz.sha256"
      - name: Upload exact release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          gh release view "v$version" >/dev/null 2>&1 || gh release create "v$version" --title "v$version" --generate-notes
          gh release upload "v$version" \
            "dist/pro-gate-runtime-$version.tar.gz" \
            "dist/pro-gate-runtime-$version.tar.gz.sha256" \
            --clobber
