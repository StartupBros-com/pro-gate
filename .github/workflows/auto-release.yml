name: Auto release on VERSION bump

# Closes the merge->release gap: when main's VERSION has no matching tag yet, push the tag
# with the RELEASE_PAT identity so the tag-push event triggers release.yml (GITHUB_TOKEN
# events are suppressed by GitHub's recursion rule and would leave the chain dead). Bumping
# VERSION (+ plugin.json) in a PR is therefore the SHIP signal; everything downstream keeps
# its existing guards: release.yml re-runs the full test suite on the tagged commit, verifies
# the tag is on the default branch, packages with checksums, and the release train validates
# again before promoting the marketplace manifest.
#
# Without the RELEASE_PAT secret this workflow skips with a notice and the manual flow
# (operator pushes the tag) keeps working unchanged. The tag-absent guard makes the workflow
# idempotent and self-healing: a merge that failed to release is retried by the next push.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: auto-release-pro-gate
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out main
        uses: actions/checkout@ac593985615ec2ede58e132d2e21d2b1cbd6127c
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Decide whether a release is due
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION '$version' is not release semver; skipping" >&2
            echo "due=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          manifest="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["version"])' .claude-plugin/plugin.json)"
          if [ "$manifest" != "$version" ]; then
            echo "plugin manifest ($manifest) does not match VERSION ($version); skipping (the release train would refuse this release anyway)" >&2
            echo "due=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/v$version" >/dev/null 2>&1; then
            # A tag is NOT proof the chain finished: packaging/publish/train can fail after
            # tag creation, and later pushes would otherwise skip silently forever. Nothing
            # self-retries past tag creation by design (re-dispatching privileged stages
            # automatically is how release loops happen); reconcile by hand instead.
            if gh release view "v$version" --json assets --jq '[.assets[].name] | join(",")' 2>/dev/null \
                 | grep -q "pro-gate-runtime-$version.tar.gz.sha256"; then
              echo "tag v$version already exists with complete release assets; nothing to release" >&2
            else
              echo "::warning::Tag v$version exists but its release/assets are missing or incomplete. The chain does NOT self-retry past tag creation: rerun the 'Release runtime' workflow for v$version (or delete the tag+release to let auto-release retry), then check the release train run."
            fi
            echo "due=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "due=true" >> "$GITHUB_OUTPUT"

      - name: Require RELEASE_PAT for automatic tagging
        if: steps.decide.outputs.due == 'true'
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "::notice::VERSION ${{ steps.decide.outputs.version }} is unreleased but RELEASE_PAT is not configured; falling back to the manual flow (push the tag yourself). Add a fine-grained PAT (contents: read/write on this repo) as the RELEASE_PAT secret to automate."
            exit 0
          fi

      - name: Push the release tag
        if: steps.decide.outputs.due == 'true'
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
          VERSION: ${{ steps.decide.outputs.version }}
        run: |
          set -euo pipefail
          [ -n "$RELEASE_PAT" ] || exit 0
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -a "v$VERSION" -m "pro-gate v$VERSION" "$GITHUB_SHA"
          git push "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git" "refs/tags/v$VERSION"
          echo "pushed v$VERSION; release.yml takes it from here (tests -> package -> publish -> release train -> marketplace)"
